name: receipts
description: "the receipts don't lie."
publish_to: 'none'
version: 0.2.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  # State management
  flutter_riverpod: ^2.6.1
  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.4
  # Share intake
  flutter_sharing_intent: ^2.0.4
  archive: ^3.6.1
  # Charts
  fl_chart: ^0.68.0
  # Typography
  google_fonts: ^6.2.1
  # Emoji (grapheme-correct)
  characters: ^1.3.0
  # SHA-256 dedup
  crypto: ^3.0.3
  # Date formatting
  intl: ^0.19.0
  file_selector: ^1.1.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
