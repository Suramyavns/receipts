name: receipts
description: "the receipts don't lie."
publish_to: 'none'
version: 0.2.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  # State management
  flutter_riverpod: ^2.6.1
  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.4
  # Share intake
  receive_sharing_intent:
    git:
      url: https://github.com/KasemJaffer/receive_sharing_intent
      ref: 2cea396843cd3ab1b5ec4334be4233864637874e
  # Local patch of file_picker 8.0.7 — only change is compileSdk 34→36
  # to satisfy flutter_plugin_android_lifecycle's SDK 36 requirement.
  # TODO: replace with file_selector (flutter team plugin) when there's time.
  file_picker:
    path: ../packages/file_picker
  archive: ^3.6.1
  # Charts
  fl_chart: ^0.68.0
  # Typography
  google_fonts: ^6.2.1
  # Emoji (grapheme-correct)
  characters: ^1.3.0
  # SHA-256 dedup
  crypto: ^3.0.3
  # Date formatting
  intl: ^0.19.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
