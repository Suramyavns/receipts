name: receipts
description: "the receipts don't lie."
publish_to: 'none'
version: 1.0.0

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  # State management
  flutter_riverpod: ^2.6.1
  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.4
  # Share intake
  flutter_sharing_intent: ^2.0.4
  archive: ^4.0.9
  # Charts
  fl_chart: ^0.68.0
  # Typography
  google_fonts: ^6.2.1
  # Emoji (grapheme-correct)
  characters: ^1.3.0
  # SHA-256 dedup
  crypto: ^3.0.3
  # Date formatting
  intl: ^0.19.0
  file_selector: ^1.1.0
  flutter_native_splash: ^2.4.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/icon/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/receipts_icon.png"
  remove_alpha_ios: true
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false
  linux:
    generate: false

flutter_native_splash:
  color: "#FAF4E6"
  android: true
  ios: true
